version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: teleo-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  orchestrator:
    build:
      context: ./apps/orchestrator
      dockerfile: Dockerfile
    container_name: teleo-orchestrator
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: teleo-worker
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: teleo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: teleo
      POSTGRES_PASSWORD: teleo
      POSTGRES_DB: teleo_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: teleo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
